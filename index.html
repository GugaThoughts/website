  // ---- Deterministic "tweet of the day" ----
  // Same tweet all day for everyone; changes at local midnight.
  // Uses a hash of the date string so the order looks shuffled,
  // not a visible repeating cycle like a plain index++ would.
  function hashString(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = (hash << 5) - hash + str.charCodeAt(i);
      hash |= 0; // keep it a 32-bit int
    }
    return Math.abs(hash);
  }

  function pickTweetOfTheDay(list) {
    if (!list || list.length === 0) return null;
    const now = new Date();
    const dateKey = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
    const idx = hashString(dateKey) % list.length;
    return list[idx];
  }

  const pages = {
    home: document.getElementById('page-home'),
    works: document.getElementById('page-works'),
    contact: document.getElementById('page-contact')
  };

  function showPage(name) {
    Object.values(pages).forEach(p => p.classList.remove('active'));
    (pages[name] || pages.home).classList.add('active');
  }

  function routeFromHash() {
    const hash = window.location.hash.replace('#', '');
    showPage(pages[hash] ? hash : 'home');
  }

  document.querySelectorAll('nav.top a').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const target = link.getAttribute('data-page');
      window.location.hash = target;
    });
  });

  window.addEventListener('hashchange', routeFromHash);
  routeFromHash();
</script>

</body>
</html>
